version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: mysql_compose
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: testdb
      MYSQL_USER: user
      MYSQL_PASSWORD: pass
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  app:
    build: ./app
    container_name: python_app
    depends_on:
      - mysql
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: user
      MYSQL_PASSWORD: pass
      MYSQL_DB: testdb
    command: python3 -u app.py

volumes:
  mysql_data:
